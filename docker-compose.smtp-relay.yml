services:
  smtp-relay:
    build:
      context: ./docker/smtp-relay
    container_name: nodeseeker-smtp-relay
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RELAY_TOKEN: "change-me"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USERNAME: "user@example.com"
      SMTP_PASSWORD: "password"
      SMTP_FROM: "rss@example.com"
      SMTP_STARTTLS: "true"
      SMTP_SSL: "false"
